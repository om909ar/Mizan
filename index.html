<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#0f1117">
<link rel="stylesheet" href="style.css">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    
</head>

<body>

    <div class="container">

        <!-- عنوان التطبيق -->
<header>

    <div class="header">
        <button id="undoBtn" class="undo-btn">↩️</button>
        <div id="dayBadge" class="day-badge">17</div>
        
    </div>

    <p class="app-title">
        رصيدك الحقيقي هو عملك
    </p>

</header>

        <!-- صندوق الرصيد -->
        <section class="money-box">

    <div class="money-icon">
        💰
    </div>

    <div class="balance-area">

        <span id="balanceNumber" class="balance-number">
            0
        </span>

        <span class="currency">
            ريال
        </span>

    </div>

    <p class="balance-title">
        صندوق الصدقة
    </p>

</section>

<div id="monthReminder" class="month-reminder">
    ✨ اليوم آخر يوم في الشهر، لا تنسَ التصدق وحفظ السجل.
</div>

        <!-- الأزرار -->
        <section class="buttons">

            <!-- اليمين -->
            <div class="right-column">

                <button id="fajr" class="btn danger">
             الفجر 🕌
                </button>

                <button id="dhuhr" class="btn danger">
                     الظهر 🕌 
                </button>

                <button id="asr" class="btn danger">
                     العصر 🕌 
                </button>

                <button id="maghrib" class="btn danger">
                     المغرب 🕌
                </button>

                <button id="isha" class="btn danger">
                     العشاء 🕌
                </button>
                
                <button id="jumuah" class="btn jum">
     الجمعة 🕌
                </button>

                <button id="sin" class="btn sin">
                     ذنب ❌
                </button>

            </div>

            <!-- اليسار -->
            <div class="left-column">

                <button id="witr" class="btn good">
                     الوتر 🤲
                </button>

                <button id="duha" class="btn good">
                     الضحى ☀️
                </button>

                <button id="zikr" class="btn good">
                     10000 ذكر 📿
                </button>

                <button id="quran" class="btn good">
                     10 صفحات من القران
                </button>

                <button id="good" class="btn good">
                     عمل خير 🤍
                </button>

            </div>

        </section>

        <!-- زر التصدق -->

        <button id="donate" class="donate-btn">
            تم التصدق
        </button>

    </div>

    <script src="script.js"></script>


<nav class="bottom-nav">

    <a href="index.html" class="active">
        🏠<br>الرئيسية
    </a>

    <a href="history.html">
        📖<br>السجل
    </a>

    <a href="settings.html">
        ⚙️<br>الإعدادات
    </a>

</nav>

</body>
</html>
