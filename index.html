<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- عنوان التطبيق -->
        <header>
            <h1>ميزان</h1>
        </header>

        <!-- صندوق الرصيد -->
        <section class="money-box">

            <div class="money-icon">
                💰
            </div>

            <div id="balance" class="balance">
                0 ريال
            </div>

        </section>

        <!-- الأزرار -->
        <section class="buttons">

            <!-- اليمين -->
            <div class="right-column">

                <button id="fajr" class="btn danger">
                    🕌 الفجر
                </button>

                <button id="dhuhr" class="btn danger">
                    🕌 الظهر
                </button>

                <button id="asr" class="btn danger">
                    🕌 العصر
                </button>

                <button id="maghrib" class="btn danger">
                    🕌 المغرب
                </button>

                <button id="isha" class="btn danger">
                    🕌 العشاء
                </button>

                <button id="sin" class="btn sin">
                    ❌ ذنب
                </button>

            </div>

            <!-- اليسار -->
            <div class="left-column">

                <button id="witr" class="btn good">
                    🤲 الوتر
                </button>

                <button id="duha" class="btn good">
                    ☀️ الضحى
                </button>

                <button id="zikr" class="btn good">
                    📿 10000 ذكر
                </button>

                <button id="quran" class="btn good">
                    📖 10 صفحات
                </button>

                <button id="good" class="btn good">
                    ❤️ عمل خير
                </button>

            </div>

        </section>

        <!-- زر التصدق -->

        <button id="donate" class="donate-btn">
            تم التصدق
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
